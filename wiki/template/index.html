<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>JWiki</title>
        <style>
            /* Reset */
            * {
                box-sizing: border-box;
            }

            /* Layout */
            body {
                margin: 0;
                font-family: Arial, sans-serif;
            }

            /* Header */
            .headder {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 15px 20px;
                border-bottom: 1px solid #ddd;
            }

            .search {
                margin-left: auto;
                display: flex;
                align-items: center;
                gap: 8px;
                width: 50%;
            }

            .search input {
                flex: 1;
                padding: 8px;
            }

            /* Container FULL WIDTH */
            .container {
                width: 100%;
                padding: 20px;
            }

            /* Inputs */
            .form-input,
            textarea,
            input[type="search"] {
                width: 100%;
                padding: 10px;
                margin-top: 6px;
            }

            /* Editor Layout */
            .editor-container {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
                margin-top: 20px;
            }

            /* Panes */
            .editor-pane {
                border: 1px solid #ccc;
                border-radius: 4px;
                display: flex;
                flex-direction: column;
                height: 500px;
            }

            .pane-header {
                background: #f5f5f5;
                padding: 10px;
                font-weight: bold;
                border-bottom: 1px solid #ccc;
            }

            .pane-content {
                flex: 1;
                overflow: auto;
                padding: 10px;
            }

            /* Textarea fills pane */
            .editor-textarea {
                width: 100%;
                height: 100%;
                border: none;
                resize: none;
                outline: none;
                font-family: monospace;
            }

            /* Buttons */
            .form-actions {
                display: flex;
                gap: 10px;
                margin-top: 20px;
            }

            .btn-save {
                background: #28a745;
                color: white;
                border: none;
                padding: 10px 20px;
                cursor: pointer;
            }

            .btn-cancel {
                border: 1px solid #ccc;
                padding: 10px 20px;
                cursor: pointer;
                background: white;
            }

            /* Responsive */
            @media (max-width: 900px) {
                .editor-container {
                    grid-template-columns: 1fr;
                }

                .search {
                    width: 100%;
                }
            }
        </style>
    </head>
    <body>
        <div class="headder">
            <h1>JWiki</h1>
            <p>A guy's wiki</p>

            <div class="search">
                <label for="site-search">Search the site:</label>
                <input
                    type="search"
                    id="searchInput"
                    placeholder="Search the site..."
                />
                <label for="new-page">New page:</label>
                <input
                    type="search"
                    id="site"
                    placeholder="Enter the new page's name"
                />
                <button onclick="navigate()">Edit</button>
            </div>
        </div>

        <ul id="id01">
            {{range .}}
            <li><a href="/view/{{.}}">{{.}}</a></li>
            {{end}}
        </ul>
        <script>
            function sortList() {
                var list, i, switching, b, shouldSwitch;
                list = document.getElementById("id01");
                switching = true;
                while (switching) {
                    switching = false;
                    b = list.getElementsByTagName("LI");
                    for (i = 0; i < b.length - 1; i++) {
                        shouldSwitch = false;
                        if (
                            b[i].innerHTML.toLowerCase() >
                            b[i + 1].innerHTML.toLowerCase()
                        ) {
                            shouldSwitch = true;
                            break;
                        }
                    }
                    if (shouldSwitch) {
                        b[i].parentNode.insertBefore(b[i + 1], b[i]);
                        switching = true;
                    }
                }
            }

            document
                .getElementById("searchInput")
                .addEventListener("input", async (e) => {
                    const query = e.target.value.toLowerCase();
                    const listItems = document.querySelectorAll("#id01 li");

                    listItems.forEach((item) => {
                        const text = item.textContent.toLowerCase();
                        item.style.display = text.includes(query)
                            ? "block"
                            : "none";
                    });
                });

            function navigate() {
                const site = document.getElementById("site").value;
                window.location.href = `/edit/${site}`;
            }
        </script>
    </body>
</html>

<!doctype html>

<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>JWiki</title>

        <style>
            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                font-family: Arial, sans-serif;
            }

            .headder {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 15px 20px;
                border-bottom: 1px solid #ddd;
            }

            .search {
                margin-left: auto;
                display: flex;
                gap: 8px;
                width: 40%;
            }

            .search input {
                flex: 1;
                padding: 8px;
            }

            .container {
                width: 100%;
                padding: 20px;
            }

            input,
            textarea {
                width: 100%;
                padding: 10px;
                margin-top: 6px;
            }

            .editor-container {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
                margin-top: 20px;
            }

            .editor-pane {
                border: 1px solid #ccc;
                display: flex;
                flex-direction: column;
                height: 500px;
            }

            .pane-header {
                background: #f5f5f5;
                padding: 10px;
                font-weight: bold;
                border-bottom: 1px solid #ccc;
            }

            .pane-content {
                flex: 1;
                overflow: auto;
                padding: 10px;
            }

            .editor-textarea {
                width: 100%;
                height: 100%;
                border: none;
                resize: none;
                outline: none;
                font-family: monospace;
            }

            .form-actions {
                margin-top: 20px;
            }

            .btn-save {
                background: #28a745;
                color: white;
                border: none;
                padding: 10px 20px;
                cursor: pointer;
            }

            .btn-cancel {
                border: 1px solid #ccc;
                padding: 10px 20px;
                background: white;
                cursor: pointer;
            }

            @media (max-width: 900px) {
                .editor-container {
                    grid-template-columns: 1fr;
                }

                .search {
                    width: 100%;
                }
            }

            a {
                color: black;
                text-decoration: none;
                display: flex;
                align-items: center;
                gap: 10px;
            }

            a h1 {
                margin: 0;
                padding: 0;
                font-size: 2em;
            }

            a p {
                margin: 0;
                padding: 0;
                font-size: 1em;
            }
        </style>
    </head>

    <body>
        <div class="headder">
            <a href="/">
                <h1>JWiki</h1>
                <p>A guy's wiki</p>
            </a>
            <div class="search">
                <input type="search" placeholder="Search the site..." />
                <button>Search</button>
            </div>
        </div>

        <div class="container">
            <h2>Editing {{.Title}}</h2>

            <form action="/save/{{.Title}}" method="POST">
                <div>
                    <label>Article Title</label>
                    <input type="text" name="title" value="{{.Title}}" />
                </div>

                <div class="editor-container">
                    <div class="editor-pane">
                        <div class="pane-header">Editor</div>
                        <div class="pane-content">
                            <textarea class="editor-textarea" name="body">
{{printf "%s" .Body}}</textarea
                            >
                        </div>
                    </div>

                    <div class="editor-pane">
                        <div class="pane-header">Preview</div>
                        <div class="pane-content" id="preview"></div>
                    </div>
                </div>

                <div class="form-actions">
                    <input type="submit" value="Save Page" class="btn-save" />
                    <button
                        type="button"
                        class="btn-cancel"
                        onclick="history.back()"
                    >
                        Discard
                    </button>
                </div>
            </form>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

        <script>
            const editorTextarea = document.querySelector(
                "textarea[name='body']",
            );
            const previewDiv = document.getElementById("preview");

            editorTextarea.addEventListener("input", updatePreview);
            updatePreview();

            function updatePreview() {
                previewDiv.innerHTML = marked.parse(editorTextarea.value);
            }
        </script>
    </body>
</html>

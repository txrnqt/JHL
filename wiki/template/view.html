<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{{.Title}} - JWiki</title>
        <style>
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                font-family: Arial, sans-serif;
            }
            .headder {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 15px 20px;
                border-bottom: 1px solid #ddd;
            }
            .logo {
                display: flex;
                align-items: center;
                gap: 10px;
                color: black;
                text-decoration: none;
            }
            .logo h1 {
                margin: 0;
                padding: 0;
                font-size: 2em;
            }
            .logo p {
                margin: 0;
                padding: 0;
                font-size: 1em;
            }
            .search {
                margin-left: auto;
                position: relative;
                width: 40%;
                display: flex;
                gap: 8px;
            }
            .search input {
                flex: 1;
                padding: 8px;
            }
            .search button {
                padding: 8px 16px;
                cursor: pointer;
            }
            .search-dropdown {
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: white;
                border: 1px solid #ccc;
                border-top: none;
                max-height: 300px;
                overflow-y: auto;
                display: none;
                z-index: 10;
                margin-top: -8px;
            }
            .search-dropdown.active {
                display: block;
            }
            .search-dropdown a {
                display: block;
                padding: 10px;
                text-decoration: none;
                color: black;
                border-bottom: 1px solid #eee;
            }
            .search-dropdown a:hover {
                background: #f5f5f5;
            }
            .container {
                width: 100%;
                padding: 20px;
                max-width: 900px;
                margin: 0 auto;
            }
            .page-title {
                margin-bottom: 10px;
            }
            .edit-link {
                margin-bottom: 20px;
                display: inline-block;
                color: #0066cc;
                text-decoration: underline;
            }
            .edit-link:hover {
                text-decoration: none;
            }
            .content {
                line-height: 1.6;
            }
            @media (max-width: 900px) {
                .search {
                    width: 100%;
                }
            }
        </style>
    </head>
    <body>
        <div class="headder">
            <a href="/" class="logo">
                <h1>JWiki</h1>
                <p>A guy's wiki</p>
            </a>
            <div class="search">
                <input
                    type="search"
                    id="searchInput"
                    placeholder="Search the site..."
                />
                <button>Search</button>
                <div id="searchResults" class="search-dropdown"></div>
            </div>
        </div>
        <div class="container">
            <h1 class="page-title">{{.Title}}</h1>
            <a class="edit-link" href="/edit/{{.Title}}">Edit</a>
            <div class="content" id="content">{{printf "%s" .Body}}</div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <script>
            const rawMarkdown = document.getElementById("content").innerText;
            document.getElementById("content").innerHTML =
                marked.parse(rawMarkdown);

            const searchInput = document.getElementById("searchInput");
            const searchResults = document.getElementById("searchResults");

            searchInput.addEventListener("input", async (e) => {
                const query = e.target.value;

                if (query.length < 1) {
                    searchResults.classList.remove("active");
                    return;
                }

                const response = await fetch(
                    `/search?q=${encodeURIComponent(query)}`,
                );
                const results = await response.json();

                searchResults.innerHTML = "";

                results.forEach((result) => {
                    const link = document.createElement("a");
                    link.href = `/view/${result}`;
                    link.textContent = result;
                    searchResults.appendChild(link);
                });

                searchResults.classList.add("active");
            });

            document.addEventListener("click", (e) => {
                if (!e.target.closest(".search")) {
                    searchResults.classList.remove("active");
                }
            });
        </script>
    </body>
</html>
